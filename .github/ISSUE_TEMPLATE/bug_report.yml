name: Bug report
description: Something in Iris is broken or behaves wrong
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Iris version
      description: From Settings > About.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Logs, screenshots, adapter or plugin details, whatever helps.
    validations:
      required: false
