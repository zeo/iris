name: Feature request
description: Suggest something Iris should do
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Iris makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What you have in mind
      description: How you imagine it working. Rough is fine.
    validations:
      required: true
