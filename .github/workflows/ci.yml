name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# the self-hosted runners build the whole (heavy) Rust workspace, so back-to-back
# pushes would otherwise stack full runs. collapse a ref to its latest run: a new
# push cancels the older in-progress or queued run for the same branch or PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # bypass the runner's machine-level sccache wrapper, whose server drops
  # connections mid-build; Swatinem/rust-cache still caches deps between runs
  RUSTC_WRAPPER: ""

jobs:
  # build, test, and clippy on Windows. compiling the app crate embeds the built
  # frontend and validates the bundled engine binary, so the frontend is built and
  # the release engine produced before the cargo steps.
  windows:
    if: github.actor == 'zeo'
    runs-on: [self-hosted, windows-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # the ephemeral vms use a per-run _work/vm-<id> path, so a restored target
          # dir has dead absolute paths in its build-script binaries and dep-info files
          # and the build fails on them; cache the cargo registry only, rebuild target
          cache-targets: "false"
      - name: repair partial cargo source extraction
        shell: pwsh
        run: |
          # this runner shares one cargo home across jobs, and a run cancelled
          # mid-extraction (cancel-in-progress) can leave a crate source tree
          # incomplete, e.g. windows_x86_64_msvc missing windows.0.52.0.lib, which
          # later fails the engine link with LNK1181. drop the extracted sources so
          # cargo re-expands them from the cached .crate archives; the download
          # cache (registry/cache) and index are untouched, so this stays cheap.
          $src = Join-Path $env:USERPROFILE '.cargo\registry\src'
          if (Test-Path $src) { Remove-Item $src -Recurse -Force }
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: build frontend
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: build engine (release, for the app resource)
        run: cargo build --release -p iris-service
      - name: verify packaged desktop
        run: |
          cargo build --release -p iris-app
          $binary = [IO.File]::ReadAllBytes("target/release/iris.exe")
          $text = [Text.Encoding]::ASCII.GetString($binary)
          if ($text.Contains("http://localhost:1423")) {
            throw "release desktop still points at the development server"
          }
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  # the same gate for Linux: this is where the platform-linux backend (sock_diag,
  # nftables, NFQUEUE, the sandboxed spawn) is actually compiled and linted, since
  # it is empty on Windows.
  linux:
    if: github.actor == 'zeo'
    runs-on: [self-hosted, linux-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      # the ephemeral linux vms image rustup without user-level shims, so nothing
      # puts cargo on PATH; ask rustup where the real cargo binary lives
      - name: cargo on PATH
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          dirname "$(rustup which cargo)" | tee -a "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # the ephemeral vms use a per-run _work/vm-<id> path, so a restored target
          # dir has dead absolute paths in its build-script binaries and dep-info files
          # and the build fails on them; cache the cargo registry only, rebuild target
          cache-targets: "false"
      - name: system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libwebkit2gtk-4.1-dev \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libgtk-layer-shell-dev libnetfilter-queue-dev nftables
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: build frontend
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: build engine (release, for the app resource)
        run: cargo build --release -p iris-service
      - name: verify packaged desktop
        run: |
          cargo build --release -p iris-app
          if LC_ALL=C grep -aFq 'http://localhost:1423' target/release/iris; then
            echo 'release desktop still points at the development server' >&2
            exit 1
          fi
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  # security advisory scan of the dependency tree (RUSTSEC database)
  audit:
    if: github.actor == 'zeo'
    runs-on: [self-hosted, linux-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # the ephemeral vms use a per-run _work/vm-<id> path, so a restored target
          # dir has dead absolute paths in its build-script binaries and dep-info files
          # and the build fails on them; cache the cargo registry only, rebuild target
          cache-targets: "false"
      - name: install cargo-audit
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: cargo-audit
      - name: audit
        run: cargo audit
