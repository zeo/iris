name: release

# build and attach the installers when a version tag is pushed. Windows gets the
# WiX MSI; Linux gets the .deb, .rpm, and AppImage. both jobs target the same tag,
# so tauri-action creates the release once and the second job attaches to it, and
# each emits the updater artifacts the in-app updater reads from latest.json.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # bypass the runner's machine-level sccache wrapper, whose server drops
  # connections mid-build; Swatinem/rust-cache still caches deps between runs
  RUSTC_WRAPPER: ""

jobs:
  build-windows:
    if: github.actor == 'zeo'
    runs-on: [self-hosted, windows-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'iris ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  build-linux:
    if: github.actor == 'zeo'
    runs-on: [self-hosted, linux-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: cargo on PATH
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          dirname "$(rustup which cargo)" | tee -a "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libwebkit2gtk-4.1-dev \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            rpm file
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'iris ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
