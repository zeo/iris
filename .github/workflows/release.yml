name: release

# build and attach the installers when a version tag is pushed. Windows gets
# nsis setup.exe and wix MSI; Linux gets .deb, .rpm, and AppImage. both jobs target the same tag,
# so tauri-action creates the release once and the second job attaches to it.
# the jobs run in order so their updater metadata is merged without a race.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # bypass the runner's machine-level sccache wrapper, whose server drops
  # connections mid-build; Swatinem/rust-cache still caches deps between runs
  RUSTC_WRAPPER: ""

jobs:
  build-windows:
    if: github.actor == 'zeo'
    runs-on: [self-hosted, windows-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # the ephemeral vms use a per-run _work/vm-<id> path, so a restored target
          # dir has dead absolute paths in its build-script binaries and dep-info files
          # and the build fails on them; cache the cargo registry only, rebuild target
          cache-targets: "false"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: build and release
        uses: tauri-apps/tauri-action@944946e3e4cac6603d1fe8f514171e9ecd3c78aa # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'iris ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true

  build-linux:
    if: github.actor == 'zeo'
    needs: build-windows
    runs-on: [self-hosted, linux-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: cargo on PATH
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          dirname "$(rustup which cargo)" | tee -a "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # the ephemeral vms use a per-run _work/vm-<id> path, so a restored target
          # dir has dead absolute paths in its build-script binaries and dep-info files
          # and the build fails on them; cache the cargo registry only, rebuild target
          cache-targets: "false"
      - name: system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libwebkit2gtk-4.1-dev \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libgtk-layer-shell-dev libnetfilter-queue-dev nftables patchelf rpm file xdg-utils
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: build and release
        uses: tauri-apps/tauri-action@944946e3e4cac6603d1fe8f514171e9ecd3c78aa # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'iris ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
